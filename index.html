<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xenkor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar">
    <span id="title">⬡ XENKOR</span>
    <span id="stats"></span>
    <span class="spacer"></span>
    <button id="toggle-fx" class="secondary">🎬 FX on</button>
    <button id="toggle-sound" class="secondary">🔊 Sound</button>
    <button id="end-turn">End Turn ⏵</button>
    <button id="surrender" class="secondary">Surrender</button>
    <button id="new-game" class="secondary">New Game</button>
  </header>
  <main>
    <div id="map-wrap"><canvas id="map"></canvas></div>
    <aside id="sidebar">
      <section id="players"></section>
      <section id="actions"></section>
      <section id="hexinfo"></section>
      <section id="log"></section>
    </aside>
  </main>
  <div id="toast" class="hidden"></div>
  <div id="tooltip" class="hidden"></div>
  <div id="overlay" class="hidden"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
